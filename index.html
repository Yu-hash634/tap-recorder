<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Tap Recorder</title>
<style>
body {
  margin: 0;
  background: #111;
  color: white;
  font-family: sans-serif;
  display: flex;
  flex-direction: column;
  height: 100vh;
  transition: background 0.2s;
}

body.recording {
  background: #0b1f14;
}

#controls {
  height: 50%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

#tapArea {
  height: 50%;
  width: 100%;
}

input, textarea {
  width: 80%;
  max-width: 400px;
  padding: 12px;
  margin: 5px;
  font-size: 16px;
  border-radius: 8px;
}

textarea {
  height: 60px;
}

button {
  width: 80%;
  max-width: 400px;
  margin: 6px;
  padding: 18px;
  font-size: 20px;
  border-radius: 10px;
  border: none;
  color: white;
}

button:active {
  background: white !important;
  color: black;
}

.start { background: #1e6f4f; }
.stop { background: #7a2f2f; }
.reset { background: #555; }
.copy { background: #2c5d87; }

body.recording .start {
  background: #0b1f14;
}

#info {
  font-size: 16px;
}
</style>
</head>
<body>

<div id="controls">
  <h2>Tap Recorder</h2>

  <input id="nameInput" placeholder="name">

  <button class="start" onclick="start()">START</button>
  <button class="stop" onclick="stop()">STOP</button>
  <button class="reset" onclick="reset()">RESET</button>
  <button class="copy" onclick="exportDesmos()">コピー（Desmos用）</button>

  <textarea id="output" readonly placeholder="ここに出る"></textarea>

  <p id="info">time: 0.00 s | taps: 0</p>
</div>

<div id="tapArea"></div>

<script>
let taps = [];
let startTime = null;
let running = false;

const tapArea = document.getElementById("tapArea");

// START
function start() {
  taps = [];
  startTime = performance.now();
  running = true;
  document.body.classList.add("recording");
}

// STOP
function stop() {
  running = false;
  document.body.classList.remove("recording");
}

// RESET
function reset() {
  taps = [];
  running = false;
  startTime = null;
  document.body.classList.remove("recording");
  updateInfo();
  document.getElementById("output").value = "";
}

// タップ
tapArea.addEventListener("touchstart", (e) => {
  if (!running) return;
  e.preventDefault();

  const now = performance.now();

  for (let i = 0; i < e.changedTouches.length; i++) {
    taps.push(now - startTime);
  }

  updateInfo();
}, { passive: false });

tapArea.addEventListener("mousedown", () => {
  if (!running) return;

  const now = performance.now();
  taps.push(now - startTime);
  updateInfo();
});

// 表示
function updateInfo() {
  if (!startTime) {
    info.innerText = "time: 0.00 s | taps: 0";
    return;
  }

  const now = performance.now();
  const time = running ? now - startTime : taps[taps.length - 1] || 0;

  info.innerText = `time: ${(time/1000).toFixed(2)} s | taps: ${taps.length}`;
}

// Desmos出力
function exportDesmos() {
  if (taps.length === 0) return;

  let points = taps.map(t => `(${(t/1000).toFixed(2)},0)`).join(",");

  const output = document.getElementById("output");
  output.value = points;

  // クリップボードコピー
  navigator.clipboard.writeText(points);
}
</script>

</body>
</html>
