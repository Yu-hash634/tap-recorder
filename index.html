<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Tap Recorder</title>
<style>
body {
  background: #111;
  color: white;
  font-family: sans-serif;
  text-align: center;
  padding-top: 50px;
}

/* UI前面 */
button, input, #info {
  position: relative;
  z-index: 1;
  margin: 10px;
  padding: 12px;
  font-size: 16px;
}

/* タップ検知エリア */
#tapArea {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
}
</style>
</head>
<body>

<h2>Tap Recorder</h2>

<input id="nameInput" placeholder="name">

<br>

<button onclick="start()">START</button>
<button onclick="stop()">STOP</button>
<button onclick="reset()">RESET</button>
<button onclick="exportCSV()">CSV保存</button>

<p id="info">time: 0.00 s | taps: 0</p>

<div id="tapArea"></div>

<script>
let taps = [];
let startTime = null;
let running = false;

const tapArea = document.getElementById("tapArea");

// START
function start() {
  taps = [];
  startTime = performance.now();
  running = true;
}

// STOP
function stop() {
  running = false;
}

// RESET
function reset() {
  taps = [];
  running = false;
  startTime = null;
  updateInfo();
}

// マルチタッチ
tapArea.addEventListener("touchstart", (e) => {
  if (!running) return;

  e.preventDefault();

  const now = performance.now();

  for (let i = 0; i < e.changedTouches.length; i++) {
    taps.push(now - startTime);
  }

  updateInfo();
}, { passive: false });

// マウス
tapArea.addEventListener("mousedown", () => {
  if (!running) return;

  const now = performance.now();
  taps.push(now - startTime);

  updateInfo();
});

// 表示更新
function updateInfo() {
  if (!startTime) {
    document.getElementById("info").innerText = "time: 0.00 s | taps: 0";
    return;
  }

  const now = performance.now();
  const time = running ? now - startTime : taps[taps.length - 1] || 0;

  document.getElementById("info").innerText =
    `time: ${(time/1000).toFixed(2)} s | taps: ${taps.length}`;
}

// CSV出力（累積波）
function exportCSV() {
  if (taps.length === 0) return;

  const name = document.getElementById("nameInput").value || "tap_log";

  let csv = "index,time(ms),interval(ms),centered,cumulative\n";

  const intervals = taps.map((t, i) =>
    i === 0 ? t : t - taps[i-1]
  );

  const avg = intervals.reduce((a, b) => a + b, 0) / intervals.length;

  let cumulative = 0;

  for (let i = 0; i < taps.length; i++) {
    const t = taps[i];
    const interval = intervals[i];

    const centered = interval - avg;

    const signed = centered * (i % 2 === 0 ? 1 : -1);

    cumulative += signed;

    csv += `${i+1},${t.toFixed(2)},${interval.toFixed(2)},${centered.toFixed(2)},${cumulative.toFixed(2)}\n`;
  }

  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = `${name}.csv`;
  a.click();

  URL.revokeObjectURL(url);
}
</script>

</body>
</html>
