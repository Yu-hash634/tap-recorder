<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Tap Recorder</title>
<style>
body {
  margin: 0;
  background: #111;
  color: white;
  font-family: sans-serif;
  display: flex;
  flex-direction: column;
  height: 100vh;
  transition: background 0.2s;
}

/* 録音中 */
body.recording {
  background: #0b1f14;
}

/* 上半分（UI） */
#controls {
  height: 50%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* 下半分（タップ） */
#tapArea {
  height: 50%;
  width: 100%;
}

/* 入力 */
input {
  width: 80%;
  max-width: 400px;
  padding: 15px;
  font-size: 18px;
  margin-bottom: 10px;
  border-radius: 8px;
}

/* ボタン */
button {
  width: 80%;
  max-width: 400px;
  margin: 8px;
  padding: 20px;
  font-size: 22px;
  border-radius: 12px;
  border: none;
  color: white;
  transition: background 0.15s, transform 0.05s;
}

/* タップ感 */
button:active {
  background: white !important;
  color: black;
  transform: scale(0.98);
}

/* 色（暗め） */
.start { background: #1e6f4f; }
.stop { background: #7a2f2f; }
.reset { background: #555; }
.save { background: #2c5d87; }

/* 録音中START */
body.recording .start {
  background: #0b1f14;
}

/* 情報 */
#info {
  font-size: 16px;
}
</style>
</head>
<body>

<div id="controls">
  <h2>Tap Recorder</h2>

  <input id="nameInput" placeholder="name">

  <button class="start" onclick="start()">START</button>
  <button class="stop" onclick="stop()">STOP</button>
  <button class="reset" onclick="reset()">RESET</button>
  <button class="save" onclick="exportCSV()">CSV保存</button>

  <p id="info">time: 0.00 s | taps: 0</p>
</div>

<div id="tapArea"></div>

<script>
let taps = [];
let startTime = null;
let running = false;

const tapArea = document.getElementById("tapArea");

// START
function start() {
  taps = [];
  startTime = performance.now();
  running = true;
  document.body.classList.add("recording");
}

// STOP
function stop() {
  running = false;
  document.body.classList.remove("recording");
}

// RESET
function reset() {
  taps = [];
  running = false;
  startTime = null;
  document.body.classList.remove("recording");
  updateInfo();
}

// タップ（下半分だけ）
tapArea.addEventListener("touchstart", (e) => {
  if (!running) return;

  e.preventDefault();
  const now = performance.now();

  for (let i = 0; i < e.changedTouches.length; i++) {
    taps.push(now - startTime);
  }

  updateInfo();
}, { passive: false });

tapArea.addEventListener("mousedown", () => {
  if (!running) return;

  const now = performance.now();
  taps.push(now - startTime);
  updateInfo();
});

// 表示
function updateInfo() {
  if (!startTime) {
    info.innerText = "time: 0.00 s | taps: 0";
    return;
  }

  const now = performance.now();
  const time = running ? now - startTime : taps[taps.length - 1] || 0;

  info.innerText = `time: ${(time/1000).toFixed(2)} s | taps: ${taps.length}`;
}

// CSV
function exportCSV() {
  if (taps.length === 0) return;

  const input = document.getElementById("nameInput");
  const name = input.value || "tap_log";

  let csv = "time(ms),y,red,green,blue\n";

  const intervals = taps.map((t, i) =>
    i === 0 ? 0 : t - taps[i-1]
  );

  for (let i = 0; i < taps.length; i++) {
    const t = taps[i];
    const intervalSec = intervals[i] / 1000;

    let red = "";
    let green = "";
    let blue = "";

    if (intervalSec >= 0.95 && intervalSec <= 1.05) {
      red = 0;
    } else if (intervalSec >= 0.45 && intervalSec <= 0.55) {
      green = 0;
    } else {
      blue = 0;
    }

    csv += `${t.toFixed(2)},0,${red},${green},${blue}\n`;
  }

  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = `${name}.csv`;
  a.click();

  URL.revokeObjectURL(url);

  input.value = "";
}
</script>

</body>
</html>
